name = "hamrah-com"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2026-06-16"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
binding = "ASSETS"
directory = ".svelte-kit/cloudflare"

[observability]
enabled = true

[placement]
mode = "smart"

[[routes]]
pattern = "hamrah.com"
custom_domain = true

[[routes]]
pattern = "www.hamrah.com"
custom_domain = true
